version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: iscream_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: iscream
      POSTGRES_DB: iscream
    ports:
      - "5432:5432"
    volumes:
      - iscream_pgdata:/var/lib/postgresql/data
volumes:
  iscream_pgdata:
